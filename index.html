<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<title>75 Hard Tracker</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>75 HARD TRACKER</h1>
<h2 id="day-text">Dia 1 / 75</h2>

<div class="tasks">

<label>
<input type="checkbox" class="task">
Beber 4L de água
</label>

<label>
<input type="checkbox" class="task">
Treino 45 minutos
</label>

<label>
<input type="checkbox" class="task">
Treino ao ar livre
</label>

<label>
<input type="checkbox" class="task">
Ler 10 páginas
</label>

<label>
<input type="checkbox" class="task">
Seguir dieta
</label>

<label>
<input type="checkbox" class="task">
Foto do progresso
</label>

</div>

<div class="progress-container">
<div class="progress-bar" id="progress-bar"></div>
</div>

<p id="progress-text">0% completo</p>

<button id="finish-day">Finalizar Dia</button>
<button id="reset">Resetar Desafio</button>

<h3>Histórico</h3>
<div id="history-list" class="history-grid"></div>

<h3>Heatmap</h3>
<div id="heatmap" class="heatmap"></div>

</div>

<script src="script.js"></script>

</body>
</html>
